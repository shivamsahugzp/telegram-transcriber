name: Keep Render Alive

on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 minutes, 24/7
  workflow_dispatch:         # allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping bot
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://tg-video-transcriber.onrender.com/)
          echo "Health check status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Warning: got $STATUS instead of 200"
          fi
