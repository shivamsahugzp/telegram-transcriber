app = "tg-video-transcriber"
primary_region = "sin"

[build]

# No HTTP service — this is a polling Telegram bot
# Uses 1x shared-cpu + 256MB RAM which is within Fly.io free tier (no charges)

[machines]
  auto_stop = false
  min_machines_running = 1

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

[deploy]
  strategy = "recreate"
